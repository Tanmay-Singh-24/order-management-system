<svg viewBox="0 0 760 410" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Application architecture</title>
  <desc>The oms C++17 CLI is layered as main.cpp, a service layer, and a RAII Database wrapper, which talks to a MySQL InnoDB database over the X Protocol on port 33060.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="410" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="759" height="409" rx="14" fill="none" stroke="#EBE9E3"/>

  <text x="48" y="37" font-size="13" font-weight="500" fill="#9A988F">Application architecture</text>

  <!-- application container -->
  <rect x="48" y="56" width="372" height="300" rx="14" fill="#FFFFFF" stroke="#D9D6CE"/>
  <text x="68" y="87" font-size="15" font-weight="500" fill="#1A1A18">oms · CLI application</text>
  <text x="68" y="105" font-size="12" fill="#75736C">C++17</text>
  <line x1="48" y1="120" x2="420" y2="120" stroke="#EDEBE5"/>

  <!-- layer: main -->
  <rect x="68" y="136" width="332" height="56" rx="10" fill="#F6F5F2" stroke="#E3E1DA"/>
  <text x="84" y="161" font-size="14" font-weight="500" fill="#1A1A18">main.cpp</text>
  <text x="84" y="180" font-size="11.5" fill="#7C7A72">menu · input validation · output</text>
  <line x1="234" y1="192" x2="234" y2="212" stroke="#B7B4AB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- layer: services -->
  <rect x="68" y="212" width="332" height="56" rx="10" fill="#F6F5F2" stroke="#E3E1DA"/>
  <text x="84" y="237" font-size="14" font-weight="500" fill="#1A1A18">Service layer</text>
  <text x="84" y="256" font-size="11.5" fill="#7C7A72">Customer · Product · Order</text>
  <line x1="234" y1="268" x2="234" y2="288" stroke="#B7B4AB" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- layer: database wrapper -->
  <rect x="68" y="288" width="332" height="56" rx="10" fill="#F6F5F2" stroke="#E3E1DA"/>
  <text x="84" y="313" font-size="14" font-weight="500" fill="#1A1A18">Database</text>
  <text x="84" y="332" font-size="11.5" fill="#7C7A72">RAII wrapper · mysqlx::Session</text>

  <!-- connection to MySQL -->
  <line x1="400" y1="316" x2="554" y2="316" stroke="#4479A1" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="478" y="305" font-size="11" font-weight="500" fill="#3A6B8F" text-anchor="middle">X Protocol · TLS</text>
  <text x="478" y="333" font-size="11" fill="#7C7A72" text-anchor="middle">port 33060</text>

  <!-- MySQL cylinder -->
  <path d="M556 276 L556 356 A76 12 0 0 0 708 356 L708 276" fill="#E9F1F6" stroke="#4479A1" stroke-width="1.4"/>
  <ellipse cx="632" cy="276" rx="76" ry="12" fill="#E9F1F6" stroke="#4479A1" stroke-width="1.4"/>
  <text x="632" y="312" text-anchor="middle" font-size="14" font-weight="500" fill="#1B3F57">MySQL 9.6</text>
  <text x="632" y="332" text-anchor="middle" font-size="11.5" fill="#4479A1">InnoDB · ordersdb</text>
</svg>
