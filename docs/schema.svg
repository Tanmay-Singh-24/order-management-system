<svg viewBox="0 0 624 496" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Database schema (3NF)</title>
  <desc>Four tables: customers and products are parents; orders links to customers; order_items is the junction table linking orders and products, snapshotting unit_price. Keys are marked PK, FK, UK.</desc>

  <rect x="0" y="0" width="624" height="496" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="623" height="495" rx="14" fill="none" stroke="#EBE9E3"/>

  <!-- relationship connectors (drawn first, behind cards) -->
  <!-- customers 1 -> N orders -->
  <line x1="146" y1="204" x2="146" y2="276" stroke="#B6B3AA" stroke-width="1.5"/>
  <text x="153" y="220" font-size="11" font-weight="500" fill="#6B6960">1</text>
  <text x="153" y="270" font-size="11" font-weight="500" fill="#6B6960">N</text>
  <text x="153" y="245" font-size="10" fill="#A29F96">places</text>
  <!-- products 1 -> N order_items -->
  <line x1="478" y1="230" x2="478" y2="276" stroke="#B6B3AA" stroke-width="1.5"/>
  <text x="485" y="246" font-size="11" font-weight="500" fill="#6B6960">1</text>
  <text x="485" y="271" font-size="11" font-weight="500" fill="#6B6960">N</text>
  <!-- orders 1 -> N order_items -->
  <line x1="252" y1="363" x2="372" y2="363" stroke="#B6B3AA" stroke-width="1.5"/>
  <text x="260" y="357" font-size="11" font-weight="500" fill="#6B6960">1</text>
  <text x="360" y="357" font-size="11" font-weight="500" fill="#6B6960">N</text>
  <text x="312" y="357" font-size="10" fill="#A29F96" text-anchor="middle">contains</text>

  <!-- ===== customers ===== -->
  <rect x="40" y="56" width="212" height="148" rx="11" fill="#FFFFFF" stroke="#D9D6CE"/>
  <text x="56" y="81" font-size="14.5" font-weight="500" fill="#1A1A18">customers</text>
  <line x1="56" y1="90" x2="236" y2="90" stroke="#C7D4DE" stroke-width="2"/>
  <!-- id PK -->
  <rect x="54" y="100" width="26" height="15" rx="4" fill="#FBEFC8"/>
  <text x="67" y="111" text-anchor="middle" font-size="9" font-weight="500" fill="#876311">PK</text>
  <text x="88" y="112" font-size="12.5" fill="#2B2A27">id</text>
  <text x="236" y="112" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <text x="88" y="138" font-size="12.5" fill="#2B2A27">name</text>
  <text x="236" y="138" text-anchor="end" font-size="10.5" fill="#928F87">varchar</text>
  <!-- email UK -->
  <rect x="54" y="152" width="26" height="15" rx="4" fill="#E7E5DF"/>
  <text x="67" y="163" text-anchor="middle" font-size="9" font-weight="500" fill="#5C5A51">UK</text>
  <text x="88" y="164" font-size="12.5" fill="#2B2A27">email</text>
  <text x="236" y="164" text-anchor="end" font-size="10.5" fill="#928F87">varchar</text>
  <text x="88" y="190" font-size="12.5" fill="#2B2A27">created_at</text>
  <text x="236" y="190" text-anchor="end" font-size="10.5" fill="#928F87">timestamp</text>

  <!-- ===== products ===== -->
  <rect x="372" y="56" width="212" height="174" rx="11" fill="#FFFFFF" stroke="#D9D6CE"/>
  <text x="388" y="81" font-size="14.5" font-weight="500" fill="#1A1A18">products</text>
  <line x1="388" y1="90" x2="568" y2="90" stroke="#C7D4DE" stroke-width="2"/>
  <rect x="386" y="100" width="26" height="15" rx="4" fill="#FBEFC8"/>
  <text x="399" y="111" text-anchor="middle" font-size="9" font-weight="500" fill="#876311">PK</text>
  <text x="420" y="112" font-size="12.5" fill="#2B2A27">id</text>
  <text x="568" y="112" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <text x="420" y="138" font-size="12.5" fill="#2B2A27">name</text>
  <text x="568" y="138" text-anchor="end" font-size="10.5" fill="#928F87">varchar</text>
  <text x="420" y="164" font-size="12.5" fill="#2B2A27">price</text>
  <text x="568" y="164" text-anchor="end" font-size="10.5" fill="#928F87">decimal</text>
  <text x="420" y="190" font-size="12.5" fill="#2B2A27">stock_quantity</text>
  <text x="568" y="190" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <text x="420" y="216" font-size="12.5" fill="#2B2A27">created_at</text>
  <text x="568" y="216" text-anchor="end" font-size="10.5" fill="#928F87">timestamp</text>

  <!-- ===== orders ===== -->
  <rect x="40" y="276" width="212" height="174" rx="11" fill="#FFFFFF" stroke="#D9D6CE"/>
  <text x="56" y="301" font-size="14.5" font-weight="500" fill="#1A1A18">orders</text>
  <line x1="56" y1="310" x2="236" y2="310" stroke="#C7D4DE" stroke-width="2"/>
  <rect x="54" y="320" width="26" height="15" rx="4" fill="#FBEFC8"/>
  <text x="67" y="331" text-anchor="middle" font-size="9" font-weight="500" fill="#876311">PK</text>
  <text x="88" y="332" font-size="12.5" fill="#2B2A27">id</text>
  <text x="236" y="332" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <rect x="54" y="346" width="26" height="15" rx="4" fill="#DCE8F1"/>
  <text x="67" y="357" text-anchor="middle" font-size="9" font-weight="500" fill="#2C567A">FK</text>
  <text x="88" y="358" font-size="12.5" fill="#2B2A27">customer_id</text>
  <text x="236" y="358" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <text x="88" y="384" font-size="12.5" fill="#2B2A27">total_amount</text>
  <text x="236" y="384" text-anchor="end" font-size="10.5" fill="#928F87">decimal</text>
  <text x="88" y="410" font-size="12.5" fill="#2B2A27">status</text>
  <text x="236" y="410" text-anchor="end" font-size="10.5" fill="#928F87">enum</text>
  <text x="88" y="436" font-size="12.5" fill="#2B2A27">created_at</text>
  <text x="236" y="436" text-anchor="end" font-size="10.5" fill="#928F87">timestamp</text>

  <!-- ===== order_items (junction) ===== -->
  <rect x="372" y="276" width="212" height="174" rx="11" fill="#FFFFFF" stroke="#D9D6CE"/>
  <text x="388" y="301" font-size="14.5" font-weight="500" fill="#1A1A18">order_items</text>
  <rect x="492" y="289" width="64" height="16" rx="8" fill="#FBF0D6"/>
  <text x="524" y="300" text-anchor="middle" font-size="9" font-weight="500" fill="#8A6A1E">junction</text>
  <line x1="388" y1="310" x2="568" y2="310" stroke="#E6C46E" stroke-width="2"/>
  <rect x="386" y="320" width="26" height="15" rx="4" fill="#FBEFC8"/>
  <text x="399" y="331" text-anchor="middle" font-size="9" font-weight="500" fill="#876311">PK</text>
  <text x="420" y="332" font-size="12.5" fill="#2B2A27">id</text>
  <text x="568" y="332" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <rect x="386" y="346" width="26" height="15" rx="4" fill="#DCE8F1"/>
  <text x="399" y="357" text-anchor="middle" font-size="9" font-weight="500" fill="#2C567A">FK</text>
  <text x="420" y="358" font-size="12.5" fill="#2B2A27">order_id</text>
  <text x="568" y="358" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <rect x="386" y="372" width="26" height="15" rx="4" fill="#DCE8F1"/>
  <text x="399" y="383" text-anchor="middle" font-size="9" font-weight="500" fill="#2C567A">FK</text>
  <text x="420" y="384" font-size="12.5" fill="#2B2A27">product_id</text>
  <text x="568" y="384" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <text x="420" y="410" font-size="12.5" fill="#2B2A27">quantity</text>
  <text x="568" y="410" text-anchor="end" font-size="10.5" fill="#928F87">int</text>
  <text x="420" y="436" font-size="12.5" fill="#2B2A27">unit_price</text>
  <text x="568" y="436" text-anchor="end" font-size="10.5" fill="#928F87">decimal</text>
</svg>
